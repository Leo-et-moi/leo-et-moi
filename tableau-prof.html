<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Tableau de bord — Leo-et-moi</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--cream:#F5F0E8;--dark:#1B2845;--navyMid:#2C4A7C;--coral:#E8503A;--text:#1A2733;
  --slate:#4A6580;--divider:#D8DFE8;--white:#FFFFFF;--green:#1E7B45;--ltGreen:#E3F5EC;--nav-h:64px;
  --a1:#C0392B;--a2:#E07B39;--b1:#D4920A;--b2:#7CB82F;--c1:#27AE60;--c2:#1A5C38;}
html{font-size:18px;}
body{font-family:Arial,sans-serif;background:var(--cream);color:var(--text);line-height:1.6;
  min-height:100vh;padding-bottom:calc(var(--nav-h) + 16px);-webkit-text-size-adjust:100%;}
.top-bar{background:var(--dark);border-bottom:4px solid var(--navyMid);padding:0 16px;height:60px;
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.site-name{font-size:22px;font-weight:bold;color:#fff;text-decoration:none;}
.site-name span{color:var(--coral);}
.icon-btn{background:none;border:none;color:#9DC8E8;font-size:22px;cursor:pointer;padding:8px;min-width:44px;min-height:44px;}
.main{max-width:760px;margin:0 auto;padding:18px 14px 8px;}
.back-link{display:inline-flex;align-items:center;gap:6px;font-size:15px;font-weight:bold;color:var(--navyMid);text-decoration:none;min-height:44px;}
.page-title{font-size:24px;font-weight:bold;color:var(--dark);margin:6px 0 2px;}
.page-sub{font-size:14px;color:var(--slate);margin-bottom:16px;}
.summary{font-size:13px;color:var(--slate);margin-bottom:14px;}
.stu{background:var(--white);border-radius:14px;box-shadow:0 2px 8px rgba(0,0,0,0.06);
  border-left:5px solid var(--navyMid);padding:16px 18px;margin-bottom:14px;}
.stu-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:4px;}
.stu-name{font-size:18px;font-weight:bold;color:var(--dark);}
.lvl-pill{font-size:12px;font-weight:bold;color:#fff;padding:2px 10px;border-radius:20px;}
.stu-meta{font-size:13px;color:var(--slate);margin-bottom:10px;}
.lesson-row{display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:9px 0;border-top:1px solid var(--divider);font-size:14px;}
.lesson-name{font-weight:bold;color:var(--dark);}
.lesson-meta{color:var(--slate);font-size:13px;text-align:right;}
.score{font-weight:bold;color:var(--green);}
.none{font-size:14px;color:var(--slate);font-style:normal;padding-top:8px;border-top:1px solid var(--divider);}
.notice{background:var(--white);border-radius:14px;padding:24px;text-align:center;color:var(--slate);box-shadow:0 2px 8px rgba(0,0,0,0.06);}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--dark);border-top:3px solid var(--coral);display:flex;align-items:center;z-index:100;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;text-decoration:none;color:#6A8FAF;min-height:var(--nav-h);}
.nav-icon{font-size:22px;line-height:1;}.nav-label{font-size:11px;font-weight:bold;}
@media(min-width:600px){.main{padding:24px 20px 8px;}}
</style>
</head>
<body>
<header class="top-bar">
  <a class="site-name" href="index.html">Leo<span>-et-</span>moi</a>
  <button class="icon-btn" title="Notifications">&#128276;</button>
</header>
<main class="main">
  <a class="back-link" href="index.html">&#8592; Accueil</a>
  <div class="page-title">&#128202; Tableau de bord</div>
  <div class="page-sub">Tes &eacute;l&egrave;ves et leurs r&eacute;sultats.</div>
  <div id="content"><div class="notice">Chargement&hellip;</div></div>
</main>
<nav class="bottom-nav">
  <a class="nav-item" href="index.html"><span class="nav-icon">&#127968;</span><span class="nav-label">Accueil</span></a>
  <a class="nav-item" href="mes-lecons.html"><span class="nav-icon">&#127467;&#127479;</span><span class="nav-label">Fran&ccedil;ais</span></a>
  <a class="nav-item" href="reference/index.html"><span class="nav-icon">&#128216;</span><span class="nav-label">R&eacute;f&eacute;rence</span></a>
  <a class="nav-item" href="index.html#progress"><span class="nav-icon">&#11088;</span><span class="nav-label">Progr&egrave;s</span></a>
</nav>
<script type="module">
import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

var LVLCOLOR={a1:'#C0392B',a2:'#E07B39',b1:'#D4920A',b2:'#7CB82F',c1:'#27AE60',c2:'#1A5C38'};
var LESSON_NAMES={
  'etre':'A1 · Le verbe Être',
  'avoir':'A1 · Le verbe Avoir',
  'c1_francine_gosselin':'C1 · Francine G. (compréhension)',
  'a1_les_nombres':'A1 · Les nombres',
  'a2_nombres_quiz':'A2 · Quiz Les nombres',
  'a2_ecoute_invitations':'A2 · Écoute — Invitations',
  'a2_lire_invitation':'A2 · Lire une invitation'
};
function fdate(ms){ try{ return new Date(Number(ms)).toLocaleDateString('fr-FR'); }catch(e){ return ''; } }
function esc(s){ var d=document.createElement('div'); d.textContent=s==null?'':String(s); return d.innerHTML; }

function ready(cb){ if(window.LEM && window.LEM.user) cb(); else document.addEventListener('lem-auth-ready', cb); }

ready(async function(){
  var content=document.getElementById('content');
  try{
    var db=window.LEM.db;
    var me=await window.LEM.getUser();
    if(!me || me.role!=='teacher'){
      content.innerHTML='<div class="notice">Cette page est r&eacute;serv&eacute;e au professeur.</div>';
      return;
    }
    var usnap=await getDocs(collection(db,'users'));
    var students=[];
    for(const d of usnap.docs){
      var u=d.data()||{}; if(u.role==='teacher') continue;
      var lessons=[];
      try{
        var lsnap=await getDocs(collection(db,'progress',d.id,'lessons'));
        lsnap.forEach(function(ld){ var x=ld.data()||{}; x.id=ld.id; lessons.push(x); });
      }catch(e){}
      students.push({uid:d.id,name:u.displayName||'',email:u.email||'',level:(u.level||'a1'),
        streak:u.streak||0, vocab:(u.vocab||[]).length, lessons:lessons});
    }
    render(content, students);
  }catch(e){
    content.innerHTML='<div class="notice">Erreur de chargement. R&eacute;essaie. ('+esc(e.message||e)+')</div>';
  }
});

function render(content, students){
  if(!students.length){ content.innerHTML='<div class="notice">Aucun &eacute;l&egrave;ve pour l&rsquo;instant.</div>'; return; }
  var totalDone=0;
  var html='';
  students.sort(function(a,b){ return (a.name||a.email).localeCompare(b.name||b.email); });
  students.forEach(function(s){
    var lvl=(s.level||'a1').toLowerCase();
    var done=s.lessons.filter(function(l){return l.completed;}).length; totalDone+=done;
    html+='<div class="stu">';
    html+='<div class="stu-head"><span class="stu-name">'+esc(s.name||s.email||'(sans nom)')+'</span>'+
          '<span class="lvl-pill" style="background:'+(LVLCOLOR[lvl]||'#888')+'">'+lvl.toUpperCase()+'</span></div>';
    html+='<div class="stu-meta">'+esc(s.email)+' &nbsp;·&nbsp; &#128293; '+s.streak+' j &nbsp;·&nbsp; &#128218; '+s.vocab+' mots</div>';
    if(!s.lessons.length){
      html+='<div class="none">Aucun exercice commenc&eacute;.</div>';
    } else {
      s.lessons.sort(function(a,b){ return (b.lastPracticed||0)-(a.lastPracticed||0); });
      s.lessons.forEach(function(l){
        var nm=LESSON_NAMES[l.id]||l.id;
        var sc=(typeof l.score==='number'&&typeof l.total==='number')?('<span class="score">'+l.score+'/'+l.total+'</span>'):'—';
        var st=l.completed?'✓ terminé':'en cours';
        var dt=l.lastPracticed?(' · '+fdate(l.lastPracticed)):'';
        html+='<div class="lesson-row"><span class="lesson-name">'+esc(nm)+'</span>'+
              '<span class="lesson-meta">'+sc+' · '+st+dt+'</span></div>';
      });
    }
    html+='</div>';
  });
  content.innerHTML='<div class="summary">'+students.length+' élève(s) · '+totalDone+' exercice(s) terminé(s) au total</div>'+html;
}
</script>
<script type="module" src="js/auth-guard.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Niveau C1 — Leo-et-moi</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--cream:#F5F0E8;--dark:#1B2845;--navyMid:#2C4A7C;--coral:#E8503A;--text:#1A2733;
  --slate:#4A6580;--divider:#D8DFE8;--white:#FFFFFF;--card:#EDE8DF;--nav-h:64px;--c1:#27AE60;}
html{font-size:18px;}
body{font-family:Arial,sans-serif;background:var(--cream);color:var(--text);line-height:1.6;
  min-height:100vh;padding-bottom:calc(var(--nav-h) + 16px);-webkit-text-size-adjust:100%;}
.top-bar{background:var(--dark);border-bottom:4px solid var(--c1);padding:0 16px;height:60px;
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.site-name{font-size:22px;font-weight:bold;color:#fff;text-decoration:none;}
.site-name span{color:var(--coral);}
.top-icons{display:flex;gap:4px;}
.icon-btn{background:none;border:none;color:#9DC8E8;font-size:22px;cursor:pointer;padding:8px;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;border-radius:50%;}
.main{max-width:600px;margin:0 auto;padding:18px 14px 8px;}
.back-link{display:inline-flex;align-items:center;gap:6px;font-size:15px;font-weight:bold;color:var(--navyMid);text-decoration:none;min-height:44px;}
.greeting-block{background:var(--dark);border-radius:16px;padding:20px 18px;margin-bottom:16px;position:relative;overflow:hidden;}
.greeting-block::before{content:'';position:absolute;top:0;left:0;width:5px;height:100%;background:var(--c1);border-radius:16px 0 0 16px;}
.greeting-name{font-size:24px;font-weight:bold;color:#fff;margin-bottom:2px;display:flex;align-items:center;gap:10px;}
.lvl-chip{background:var(--c1);color:#fff;font-size:14px;font-weight:bold;padding:2px 10px;border-radius:8px;}
.greeting-date{font-size:13px;color:#9DC8E8;}
.sec-label{font-size:12px;font-weight:bold;color:var(--slate);text-transform:uppercase;letter-spacing:1px;margin:22px 0 10px;display:flex;align-items:center;gap:8px;}
.sec-label::after{content:'';flex:1;height:1px;background:var(--divider);}
.lesson-card{display:flex;align-items:center;gap:14px;text-decoration:none;color:var(--text);background:var(--white);border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.06);border-left:6px solid var(--c1);}
.lesson-num{width:46px;height:46px;border-radius:12px;flex-shrink:0;background:var(--c1);color:#fff;font-size:16px;font-weight:bold;display:flex;align-items:center;justify-content:center;}
.lesson-body{flex:1;min-width:0;}
.lesson-name{font-size:18px;font-weight:bold;color:var(--dark);}
.lesson-sub{font-size:13px;color:var(--slate);margin-bottom:4px;}
.lesson-status{font-size:13px;font-weight:bold;color:var(--slate);}
.lesson-status.done{color:var(--c1);}
.lesson-arrow{font-size:20px;color:var(--c1);font-weight:bold;flex-shrink:0;}
.soon-card{background:var(--card);border:2px dashed var(--divider);border-radius:14px;padding:18px;text-align:center;color:var(--slate);}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--dark);border-top:3px solid var(--c1);display:flex;align-items:center;z-index:100;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;text-decoration:none;color:#6A8FAF;min-height:var(--nav-h);-webkit-tap-highlight-color:transparent;}
.nav-item.active{color:var(--coral);}
.nav-icon{font-size:22px;line-height:1;}.nav-label{font-size:11px;font-weight:bold;}
@media(min-width:600px){.main{padding:24px 20px 8px;}}
</style>
</head>
<body>
<header class="top-bar">
  <a class="site-name" href="../../index.html">Leo<span>-et-</span>moi</a>
  <div class="top-icons"><button class="icon-btn" title="Notifications">&#128276;</button></div>
</header>
<main class="main">
  <a class="back-link" href="../../mes-lecons.html">&#8592; Tous les niveaux</a>
  <div class="greeting-block">
    <div class="greeting-name"><span class="lvl-chip">C1</span> Avanc&eacute;</div>
    <div class="greeting-date">Compr&eacute;hension orale et expression &mdash; un pas &agrave; la fois.</div>
  </div>
  <div class="sec-label">&#128214; Mes exercices C1</div>
  <a class="lesson-card" href="francine-gosselin/index.html" data-status="c1_francine_gosselin">
    <div class="lesson-num">&#127911;</div>
    <div class="lesson-body">
      <div class="lesson-name">L&rsquo;entretien de Francine G.</div>
      <div class="lesson-sub">Compr&eacute;hension orale &middot; accent qu&eacute;b&eacute;cois</div>
      <span class="lesson-status" data-st="c1_francine_gosselin">&hellip;</span>
    </div>
    <span class="lesson-arrow">&#8594;</span>
  </a>
  <div class="soon-card">&#127793; D&rsquo;autres exercices C1 arrivent.</div>
</main>
<nav class="bottom-nav">
  <a class="nav-item" href="../../index.html"><span class="nav-icon">&#127968;</span><span class="nav-label">Accueil</span></a>
  <a class="nav-item active" href="../../mes-lecons.html"><span class="nav-icon">&#127467;&#127479;</span><span class="nav-label">Fran&ccedil;ais</span></a>
  <a class="nav-item" href="../../reference/index.html"><span class="nav-icon">&#128216;</span><span class="nav-label">R&eacute;f&eacute;rence</span></a>
  <a class="nav-item" href="../../index.html#progress"><span class="nav-icon">&#11088;</span><span class="nav-label">Progr&egrave;s</span></a>
</nav>
<script>
function lemC1Status(){
  document.querySelectorAll('[data-st]').forEach(function(el){
    var key=el.getAttribute('data-st');
    (async function(){
      var d=null; try{ d=await window.LEM.getLesson(key); }catch(e){}
      if(!d||!d.lastPracticed){ el.textContent='À commencer'; return; }
      el.classList.add('done');
      var t='✓ Pratiqué';
      if(typeof d.score==='number'&&typeof d.total==='number') t+=' · '+d.score+'/'+d.total;
      el.textContent=t;
    })();
  });
}
document.addEventListener('lem-auth-ready', lemC1Status);
if(window.LEM && window.LEM.user) lemC1Status();
</script>
<script type="module" src="../../js/auth-guard.js"></script>
</body>
</html>

<script>
(function(){
  var TOTAL=17,n=1;
  var img=document.getElementById('slideImg'),
      prev=document.getElementById('prevBtn'),
      next=document.getElementById('nextBtn'),
      cnt=document.getElementById('counter');
  function pad(x){return (x<10?'0':'')+x;}
  function show(){
    img.src='slides/slide-'+pad(n)+'.png';
    img.alt='Diapositive '+n;
    cnt.textContent=n+' / '+TOTAL;
    prev.disabled=(n===1);
    next.disabled=(n===TOTAL);
  }
  prev.addEventListener('click',function(){ if(n>1){n--;show();} });
  next.addEventListener('click',function(){ if(n<TOTAL){n++;show();} });
})();
</script>

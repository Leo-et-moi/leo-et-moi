var si=0, idx=0, showBack=false, _clip=null, _sq=null;
function playSeq(){
  var btn=document.getElementById('playBtn');
  if(_sq && _sq.active){
    if(!_sq.paused){ _sq.paused=true; try{ if(_clip)_clip.pause(); }catch(e){} btn.classList.remove('speaking'); return; }
    _sq.paused=false; btn.classList.add('speaking'); if(_clip && _clip.paused) _clip.play().catch(function(){}); return;
  }
  var files=SERIES[si][idx].s.slice(); var i=0;
  try{ if(_clip)_clip.pause(); }catch(e){}
  _sq={active:true,paused:false}; btn.classList.add('speaking');
  (function nx(){ if(!_sq||_sq.paused) return; if(i>=files.length){ btn.classList.remove('speaking'); _sq=null; return; } _clip=new Audio('audio/'+files[i]); i++; _clip.onended=nx; _clip.onerror=nx; _clip.play().catch(nx); })();
}
function render(){
  try{ if(_clip)_clip.pause(); }catch(e){} _sq=null; var _pb=document.getElementById("playBtn"); if(_pb)_pb.classList.remove("speaking");
  var c=SERIES[si][idx]; showBack=false;
  document.getElementById('plateTxt').textContent=c.p;
  document.getElementById('face').innerHTML='Touche la carte pour voir la r\u00E9ponse';
  document.getElementById('counter').textContent=(idx+1)+' / '+SERIES[si].length;
  document.getElementById('prev').disabled=(idx===0);
  document.getElementById('next').disabled=(idx===SERIES[si].length-1);
}
function flip(){
  var c=SERIES[si][idx]; showBack=!showBack;
  document.getElementById('face').innerHTML=showBack?('<span class="answer">'+c.b+'</span>'):'Touche la carte pour voir la r\u00E9ponse';
}
document.getElementById('prev').onclick=function(){ if(idx>0){idx--;render();} };
document.getElementById('next').onclick=function(){ if(idx<SERIES[si].length-1){idx++;render();} };
(function(){
  var t=document.getElementById('tabs');
  for(var k=0;k<SERIES.length;k++){(function(k){
    var b=document.createElement('button'); b.className='tab'+(k===0?' active':''); b.textContent='S\u00E9rie '+(k+1);

})();
